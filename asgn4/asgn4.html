<html>
    <head>
        <meta charset="utf-8">
        <title>Assignment 4</title>

        <!-- Load external libs -->
        <script src="lib/cuon-matrix-cse160.js"></script>
        <script src="lib/cuon-utils.js"></script>
        <script src="lib/webgl-debug.js"></script>
        <script src="lib/webgl-utils.js"></script>
        

        <!-- Load internal libs -->
        <script src="camera.js"></script>
        <script src="models/model.js"></script>
        <script src="models/cube.js"></script>
        <script src="models/sphere.js"></script>
        <script src="models/rat.js"></script>


        <!-- Load main -->
        <script src="asg4.js"></script>
        <script src="objLoader.js"></script>

    </head>

    <body onload="main()">
        <canvas id="canvas" width="600" height="600"></canvas>
        <div style="margin-top: 5px; text-align: left; font-family: monospace; font-size: 12px;">

        <div>POSITION</div>
        X <input type="range" id="lightX" min="-3" max="3" step="0.1" value="0.0">
        Y <input type="range" id="lightY" min="-3" max="3" step="0.1" value="1.5">
        Z <input type="range" id="lightZ" min="-3" max="3" step="0.1" value="1.0">
    

        <div style="margin-top: 8px;">LIGHT COLOR</div>
        R <input type="range" id="light1R" min="0" max="1" step="0.01" value="1.0">
        G <input type="range" id="light1G" min="0" max="1" step="0.01" value="1.0">
        B <input type="range" id="light1B" min="0" max="1" step="0.01" value="1.0">

        <br> use mouse to move camera and WASD/space to move and jump <br>

        <div style="margin-top: 10px;">
        <button id="lightsToggle" style="font-family: monospace; font-size: 12px; padding: 2px 10px;">LIGHTS: ON</button>
        </div>
        <button id="normalsToggle" style="font-family: monospace; font-size: 12px; padding: 2px 10px;">NORMALS: OFF</button>
        </div>
</div>
    </body>
</html>
