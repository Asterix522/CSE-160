<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Party for one</title>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/"
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        
        #instructions {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 15px;
            border-radius: 5px;
            font-size: 14px;
            z-index: 1000;
            border: 1px solid #444;
        }
        
        #instructions ul {
            margin: 5px 0;
            padding-left: 20px;
        }
        
        #instructions li {
            margin: 5px 0;
        }
        
        #candle-status {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 8px 15px;
            border-radius: 5px;
            font-size: 14px;
            z-index: 1000;
            border: 1px solid #444;
        }

        #birthday-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 80px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            z-index: 2000;
            display: none;
            text-align: center;
            white-space: nowrap;
            animation: bounce 1s ease infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.1); }
        }

        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 0.5s ease;
            color: white;
        }

        #loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        .loading-text {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .loading-timer {
            font-size: 18px;
            opacity: 0.8;
        }

        .progress-bar {
            width: 300px;
            height: 10px;
            background: rgba(255,255,255,0.3);
            border-radius: 5px;
            margin-top: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #3498db, #2ecc71);
            border-radius: 5px;
            transition: width 0.1s linear;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="loading-screen">
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading Party...</div>
        <div class="loading-timer" id="timer">10 seconds remaining</div>
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
    </div>

    <div id="instructions">
        <strong>Controls:</strong>
        <ul>
            <li>Click candle to blow it out</li>
            <li>Press R to relight</li>
            <li>L mouse to rotate camera</li>
            <li>R mouse to move camera</li>
            <li>Scroll to zoom</li>
        </ul>
    </div>

    <div id="birthday-message">🎂 HAPPY BIRTHDAY! 🎂</div>

    <script type="module" src="main.js"></script>
    
    <script>
        const loadingScreen = document.getElementById('loading-screen');
        const timerElement = document.getElementById('timer');
        const progressFill = document.getElementById('progress-fill');
        
        let secondsLeft = 10;
        
        const countdown = setInterval(() => {
            secondsLeft--;
            timerElement.textContent = secondsLeft + ' seconds remaining';
            progressFill.style.width = ((10 - secondsLeft) * 10) + '%';
            
            if (secondsLeft <= 0) {
                clearInterval(countdown);
                loadingScreen.classList.add('hidden');
            }
        }, 1000);

        window.addEventListener('candleStateChange', function(e) {
            const statusText = document.getElementById('status-text');
            const birthdayMessage = document.getElementById('birthday-message');
            
            if (e.detail.isLit) {
                birthdayMessage.style.display = 'none';
            } else {
                birthdayMessage.style.display = 'block';
            }
        });
    </script>
</body>
</html>
