<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Party for one</title>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/"
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        
        #instructions {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 15px;
            border-radius: 5px;
            font-size: 14px;
            z-index: 1000;
            border: 1px solid #444;
        }
        
        #instructions ul {
            margin: 5px 0;
            padding-left: 20px;
        }
        
        #instructions li {
            margin: 5px 0;
        }
        
        #candle-status {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 8px 15px;
            border-radius: 5px;
            font-size: 14px;
            z-index: 1000;
            border: 1px solid #444;
        }

        #birthday-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 80px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            z-index: 2000;
            display: none;
            text-align: center;
            white-space: nowrap;
            animation: bounce 1s ease infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.1); }
        }
    </style>
</head>
<body>
    <div id="instructions">
        <strong>Controls:</strong>
        <ul>
            <li>Click candle to blow it out</li>
            <li>Press R to relight</li>
            <li>L mouse to rotate camera</li>
            <li>R mouse to move camera</li>
            <li>Scroll to zoom</li>
        </ul>
    </div>
    
    <div id="birthday-message">🎂 HAPPY BIRTHDAY! 🎂</div>

    <script type="module" src="main.js"></script>
    
    <script>
        window.addEventListener('candleStateChange', function(e) {
            const statusText = document.getElementById('status-text');
            const birthdayMessage = document.getElementById('birthday-message');
            
            if (e.detail.isLit) {
                birthdayMessage.style.display = 'none';
            } else {
                birthdayMessage.style.display = 'block';
            }
        });
    </script>
</body>
</html>
